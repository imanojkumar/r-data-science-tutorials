project:
  type: website

website:
  title: "R Data Science Tutorials"

  site-url: https://imanojkumar.github.io/r-data-science-tutorials
  repo-url: https://github.com/imanojkumar/r-data-science-tutorials
  repo-actions: [edit]

  navbar:
    left:
      - href: index.qmd
        text: Home
      - href: about.qmd
        text: About
      - text: Blogs
        menu:
          - href: tutorials/index.qmd
            text: All Blogs

  search:
    location: navbar

  page-footer:
    left: "© Manoj Kumar"
    right: "Built with Quarto"

format:
  html:
    theme:
      - cosmo
      - brand
    css: styles.css
    toc: true
    reading-time: true
    toc-location: right

    code-copy: true
    code-overflow: wrap

    page-layout: article

    metadata:
      description: "Practical tutorials on R data science including data wrangling, visualization, machine learning, and reproducible research."
      keywords:
        - R programming
        - data science tutorials
        - tidyverse
        - machine learning
        - data visualization
    open-graph: true
    twitter-card: true

execute:
  freeze: auto
